<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Login | Balufy Pro</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <!--
      Fonts are self-hosted — run fetch_fonts.sh once to populate static/fonts/.
      No external CDN links = SRI finding 90003 closed.
    -->
    <link rel="stylesheet" href="/static/fonts/inter.css">
    <link rel="stylesheet" href="/static/fonts/material-symbols-outlined.css">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --surface-color: #1a1a1a;
            --border-color: #2a2a2a;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent-hover: #333333;
            --error-color: #ff5555;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-container {
            background-color: var(--surface-color);
            padding: 3rem 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            font-size: 48px;
            color: var(--text-main);
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            position: relative;
        }

        .input-group span {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 20px;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 14px 14px 44px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #555;
            box-shadow: 0 0 0 2px rgba(85, 85, 85, 0.3);
        }

        button {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background-color: #ffffff;
        }

        .error-message {
            color: var(--error-color);
            background-color: rgba(255, 85, 85, 0.1);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <span class="material-symbols-outlined logo">graphic_eq</span>
        <h1>Balufy Pro</h1>
        <p class="subtitle">Lossless Music Server</p>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">
            <!-- CSRF protection: validated server-side in csrf_protect() -->
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="input-group">
                <span class="material-symbols-outlined">lock</span>
                <input type="password" name="password" placeholder="Enter server password" required autofocus>
            </div>
            <button type="submit">
                Authenticate <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
            </button>
        </form>
    </div>

</body>
</html>
